name: CI (Meson C Library)

on:
  push:
    branches: 
      - main
  pull_request:
    branches: 
      - main

jobs:
  build-test:
    # Build on Linux only for now; test with GCC
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
        compiler:
          - gcc

    runs-on: ${{ matrix.os }}

    env:
      BUILD_DIR: builddir

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Python (Meson/Ninja need Python)
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip \
            ninja-build \
            libgsl-dev \
            libboost-all-dev

          python -m pip install --upgrade pip
          python -m pip install meson pytest

      # --------------------------
      # Compiler selection (Linux/macOS)
      # --------------------------
      - name: Select compiler (GCC/Clang)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if [ "${{ matrix.compiler }}" = "gcc" ]; then
            echo "CC=gcc"   >> $GITHUB_ENV
            echo "CXX=g++"  >> $GITHUB_ENV
          else
            echo "CC=clang" >> $GITHUB_ENV
            echo "CXX=clang++" >> $GITHUB_ENV
          fi

      # --------------------------
      # Configure, build, test
      # --------------------------
      - name: Configure (meson setup)
        run: meson setup "$BUILD_DIR" --backend ninja

      - name: Build (meson compile)
        run: meson compile -C "$BUILD_DIR"

      - name: Install Python test dependencies
        run: |
          python -m pip install pytest

      - name: Install libhankel
        run: |
          python -m pip install -e .

      - name: Run pytest
        run: |
          pytest -v

      - name: Test (meson test)
        run: meson test -C "$BUILD_DIR" --print-errorlogs
